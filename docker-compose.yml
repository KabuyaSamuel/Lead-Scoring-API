version: "3.9"

services:
  lead-scoring-api:
    build:
      context: .
      target: runtime         # use the lean production stage
    image: lead-scoring-api:latest
    container_name: lead_scoring_api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - API_KEYS=dev-key-12345,staging-key-99999
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Uncomment to add a reverse proxy in front of the API
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - lead-scoring-api