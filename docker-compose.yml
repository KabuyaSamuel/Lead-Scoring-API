version: "3.9"

networks:
  lead_net:
    driver: bridge

volumes:
  api_logs:

services:

  # ── Lead Scoring API ────────────────────────────────────────────────────────
  lead-scoring-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: lead-scoring-api:latest
    restart: unless-stopped
    networks:
      - lead_net
    expose:
      - "8000"
    volumes:
      - api_logs:/app/logs
    environment:
      PORT: ${PORT}
      API_KEYS: ${API_KEYS}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lead_nginx
    restart: unless-stopped
    networks:
      - lead_net
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      lead-scoring-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1",
             "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3